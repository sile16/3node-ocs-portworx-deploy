# KVM node inventory — one line per node.
# Columns (whitespace-separated):  hostname  role  mac  ip
#
#   - MACs MUST match agent-config.yaml. Agent installer identifies hosts
#     by MAC.
#   - IPs MUST match the DHCP host reservations in create-vms.sh's
#     tna-net XML block.
#   - VIPs (192.168.125.10 API, .11 Ingress) sit below the DHCP range and
#     must never be assigned to a node.
#   - Per-role resource spec (RAM, vCPU, disks) lives in vms/<role>.conf.

master-1.example.local   master    52:54:00:12:34:01   192.168.125.20
master-2.example.local   master    52:54:00:12:34:02   192.168.125.21
arbiter-1.example.local  arbiter   52:54:00:12:34:03   192.168.125.22
