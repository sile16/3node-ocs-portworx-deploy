# KVM VM profile: arbiter
#
# Applies to every node in nodes.conf with role=arbiter (one arbiter).
#
# Boot disk simulates a 256 GB (base-10) SATA SSD:
#   real 256 GB SSD = 256,000,000,000 bytes = 238.42 GiB (base-2).
# virt-install's size=N uses GiB and rounds UP to 256 GiB (274 GB base-10),
# which hides tight-disk edge cases. BOOT_SIZE_BYTES pre-creates the volume
# byte-precise. deploy/02-machineconfig-arbiter.yaml's startMiB math is
# sized for 238.42 GiB — recheck deploy/02- if you bump this.
#
# Bus is virtio-scsi (→ /dev/sda) — exercises the non-virtio-blk path of
# the coreos-boot-disk symlink in the same cluster as the masters.

RAM_MIB=8192
VCPUS=14

DISK_BUS=scsi                   # virtio-scsi → /dev/sdX
BOOT_SIZE_BYTES=256000000000    # 256 GB base-10 (byte-precise)
DATA_SIZE_GIB=0                 # arbiter has no data disk
