# KVM VM profile: master
#
# Applies to every node in nodes.conf with role=master (two masters).
#
# Disk layout simulates physical 2× ~512 GiB NVMe:
#   - BOOT: OS + px-metadata / px-data partitions (startMiB in deploy/templates/98-machineconfig-master.yaml)
#   - DATA: raw second device Portworx consumes whole
#
# Bus is virtio-blk (→ /dev/vda + /dev/vdb in guest) to exercise the
# coreos-boot-disk symlink on virtio-blk. Arbiter uses virtio-scsi so
# the cluster covers both bus types.

RAM_MIB=24576
VCPUS=14

DISK_BUS=virtio          # virtio-blk → /dev/vdX
BOOT_SIZE_GIB=512        # min 160 GiB (see startMiB in deploy/templates/98-machineconfig-master.yaml)
DATA_SIZE_GIB=512        # 0 = no data disk
