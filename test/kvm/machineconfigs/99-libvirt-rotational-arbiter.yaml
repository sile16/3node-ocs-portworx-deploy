# KVM-SPECIFIC WORKAROUND — NOT part of deploy/
#
# Arbiter-role companion to 99-libvirt-rotational-master.yaml. Same
# udev rule, different MachineConfig role selector, because OCP puts
# master and arbiter in separate MachineConfigPools.
#
# See 99-libvirt-rotational-master.yaml for the full rationale.

apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: arbiter
  name: 99-libvirt-rotational-arbiter
spec:
  config:
    ignition:
      version: 3.5.0
    storage:
      files:
        - path: /etc/udev/rules.d/99-libvirt-rotational.rules
          mode: 0644
          overwrite: true
          contents:
            source: "data:text/plain;charset=utf-8;base64,"
