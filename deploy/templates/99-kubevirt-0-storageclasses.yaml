# Portworx StorageClasses for OpenShift Virtualization / KubeVirt.
#
# Apply BEFORE the HyperConverged CR (99-kubevirt-2) so the SCs exist
# when CDI starts and builds StorageProfiles from them. Numbered 0 to
# reflect this ordering. PX operator 26.1.0 does NOT auto-create these.
# repl=2 is mandatory for TNA (only 2 storage nodes).
#
# Ref: https://docs.portworx.com/portworx-enterprise/provision-storage/kubevirt-vms/manage-kubevirt-vms-rwx-block/openshift
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: px-rwx-block-kubevirt
  annotations:
    storageclass.kubevirt.io/is-default-virt-class: "true"
provisioner: pxd.portworx.com
parameters:
  repl: "2"
  nodiscard: "true"
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: px-rwx-file-kubevirt
provisioner: pxd.portworx.com
parameters:
  repl: "2"
  sharedv4: "true"
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: px-cdi-scratch
provisioner: pxd.portworx.com
parameters:
  repl: "1"
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
