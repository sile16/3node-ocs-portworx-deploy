# Portworx StorageClasses for OpenShift Virtualization / KubeVirt.
#
# Ship these explicitly rather than relying on PX operator auto-creation:
#   1. Auto-create didn't fire in testing (PX was Running before HCO appeared).
#   2. Even if auto-create fires, we need repl=2 for TNA (only 2 storage
#      nodes — arbiter is storageless). Shipping explicit SCs guarantees
#      the correct repl regardless of what auto-create would choose.
#
# Apply AFTER 99-kubevirt-2-hyperconverged.yaml (HCO must exist so CDI
# can build StorageProfiles from these SCs).
#
# Per PX docs:
#   https://docs.portworx.com/portworx-enterprise/provision-storage/kubevirt-vms/manage-kubevirt-vms-rwx-block/openshift
#
# Three classes, each tuned for a KubeVirt use case:
#   px-rwx-block-kubevirt  — VM boot/data disks (RWX Block, default virt class, repl=2)
#   px-rwx-file-kubevirt   — shared filesystem for vTPM, cloud-init ISOs (repl=2)
#   px-cdi-scratch          — CDI importer scratch space (repl=1, ephemeral)
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: px-rwx-block-kubevirt
  annotations:
    storageclass.kubevirt.io/is-default-virt-class: "true"
provisioner: pxd.portworx.com
parameters:
  repl: "2"
  nodiscard: "true"
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: px-rwx-file-kubevirt
provisioner: pxd.portworx.com
parameters:
  repl: "2"
  sharedv4: "true"
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: px-cdi-scratch
provisioner: pxd.portworx.com
parameters:
  repl: "1"
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
