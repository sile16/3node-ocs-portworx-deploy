---
# Per-site aicli parameters — rendered by deploy/render.py from deploy/sites.csv.
# Usage: cd into the rendered site directory, then run aicli from there:
#   cd deploy/sites/<site>
#   aicli create cluster    --paramfile aicli_parameters.yml <cluster_name>
#   aicli create deployment --paramfile aicli_parameters.yml <cluster_name>
# IMPORTANT: `manifests: .` resolves relative to CWD. Running from the
# site directory ensures aicli picks up only the rendered 98-machineconfig-*
# manifests from this directory, not stray files from elsewhere.

base_dns_domain: ${BASE_DNS_DOMAIN}
openshift_version: "4.21"
control_plane_count: 2
pull_secret: ~/.local/pullsecret

network_type: OVNKubernetes
sno: false
full_iso: true
manifests: .

api_vip: ${API_VIP}
ingress_vip: ${INGRESS_VIP}

hosts:
  - name: ${MASTER1_HOST}
    mac: "${MASTER1_MAC}"
    role: master
  - name: ${MASTER2_HOST}
    mac: "${MASTER2_MAC}"
    role: master
  - name: ${ARBITER_HOST}
    mac: "${ARBITER_MAC}"
    role: arbiter
