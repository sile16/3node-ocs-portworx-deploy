# Portworx Enterprise operator (OLM) — namespace + OperatorGroup + Subscription.
# Manual, OLM creates the InstallPlan in a non-approved state; approve it
# before waiting for the operator Deployment:
#   IP=$(oc -n portworx get installplan -o name | head -1)
#   oc -n portworx patch "$IP" --type merge -p '{"spec":{"approved":true}}'
#   oc -n portworx wait --for=condition=Available deploy/portworx-operator --timeout=10m
apiVersion: v1
kind: Namespace
metadata:
  name: portworx
  labels:
    openshift.io/cluster-monitoring: "true"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: portworx-og
  namespace: portworx
spec:
  targetNamespaces:
    - portworx
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: portworx-certified
  namespace: portworx
spec:
  channel: stable
  name: portworx-certified
  source: certified-operators
  sourceNamespace: openshift-marketplace  
  installPlanApproval: Austomatic
  # under a StorageCluster pinned to oci-monitor:3.6.0 in 98-px4-.
  # Bump both together when intentionally moving versions.
  startingCSV: portworx-operator.v26.1.0
