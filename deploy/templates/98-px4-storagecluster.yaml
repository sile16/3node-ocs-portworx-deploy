# Portworx StorageCluster — 2+1 arbiter (TNA), PX-StoreV2, RF=2.
# ${MASTER1_HOST} / ${MASTER2_HOST} / ${ARBITER_HOST} are filled per-site by
# deploy/render.sh from the site's row in deploy/sites.csv.

apiVersion: core.libopenstorage.org/v1
kind: StorageCluster
metadata:
  name: px-cluster
  namespace: portworx
  annotations:
    portworx.io/is-openshift: "true"
    portworx.io/run-on-master: "true"
    portworx.io/misc-args: "-rt_opts small_conf=1 -T px-storev2"
spec:
  image: portworx/oci-monitor:3.6.0
  imagePullPolicy: Always
  startPort: 17001

  kvdb:
    internal: true

  secretsProvider: k8s

  placement:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: portworx.io/node-type
                operator: In
                values: [storage, storageless]

  stork:
    enabled: true
    args:
      webhook-controller: "true"

  csi:
    enabled: true

  monitoring:
    telemetry:
      enabled: true
    prometheus:
      exportMetrics: true

  # Portworx GUI: the embedded Lighthouse path (spec.userInterface / ocpDynamicPlugin)
  # is deprecating in PX 26.1.0 — neither option auto-defaults an image, both require
  # explicit pluginImage / image fields. For a UI, prefer either:
  #   - Pure1 (https://pure1.purestorage.com) — free for PX, SaaS
  #   - Portworx Central — on-prem, deploy via Helm chart `portworx-central`
  # The OpenShift web console is always available for pod/PVC views.

  runtimeOptions:
    default-io-profile: "6"

  # Device discovery: `useAll: true` (whole raw disks only) + the px-metadata
  # partition referenced by partlabel symlink. Add px-data post-install with:
  #   pxctl service drive add -d /dev/disk/by-partlabel/px-data --newpool
  #
  # DO NOT switch to `useAllWithPartitions: true` with a partlabel (or any
  # symlink) systemMetadataDevice. PX 3.6.0 fails to canonicalize the symlink
  # before cross-referencing discovery, so the partition lands in both
  # metadata and storage lists → init fails with "device … has a filesystem
  # on it with labels any:pwxN". `useAll: true` avoids this because
  # partitions are never enumerated. If you genuinely need
  # useAllWithPartitions, switch systemMetadataDevice to a raw device path
  # (/dev/vda5, /dev/sda5, /dev/nvme0n1p5) resolved per-node.
  nodes:
    - selector:
        nodeName: ${MASTER1_HOST}
      storage:
        useAll: true
        systemMetadataDevice: /dev/disk/by-partlabel/px-metadata

    - selector:
        nodeName: ${MASTER2_HOST}
      storage:
        useAll: true
        systemMetadataDevice: /dev/disk/by-partlabel/px-metadata

    - selector:
        nodeName: ${ARBITER_HOST}
      storage:
        devices: []
        useAll: false
        kvdbDevice: /dev/disk/by-partlabel/px-metadata
