# Portworx Enterprise operator (OLM) — namespace + OperatorGroup + Subscription.
# Apply after 04-prepare-for-portworx.sh; wait for the operator Deployment to
# become Available, then apply 06-portworx-storagecluster.yaml.
apiVersion: v1
kind: Namespace
metadata:
  name: portworx
  labels:
    openshift.io/cluster-monitoring: "true"
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: portworx-og
  namespace: portworx
spec:
  targetNamespaces:
    - portworx
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: portworx-certified
  namespace: portworx
spec:
  channel: stable
  name: portworx-certified
  source: certified-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
