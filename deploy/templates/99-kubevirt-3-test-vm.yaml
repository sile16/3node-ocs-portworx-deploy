# Minimal KubeVirt test VM on Portworx — smoke-test that PX-backed DataVolume
# provisions RWX Block, VM boots, and cloud-init seeds a login.
#
# Flow at apply time:
#   1. DataVolume `vm-pxtest-boot` → PVC on `px-rwx-block-kubevirt`
#      (PX 3.6.0 + operator 26.1.0 auto-sets this SC as the KubeVirt default
#      once the HyperConverged CR is present)
#   2. CDI imports the Fedora Cloud image into the PVC's block device
#   3. VirtualMachine references the PVC as a `persistentVolumeClaim` disk
#   4. cloud-init sets the fedora user password = fedora
#
# Verify:
#   oc get pvc -n default vm-pxtest-boot   # Bound, RWX, Block
#   oc get dv  -n default vm-pxtest-boot   # Succeeded
#   oc get vmi -n default vm-pxtest        # Running, with node assignment
#   virtctl console vm-pxtest              # (or: oc -n default console vmi/vm-pxtest)
#   login: fedora / fedora
#
# Live-migration smoke test (requires a second compute node with virt-handler):
#   virtctl migrate vm-pxtest              # PVC follows via RWX block
---
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: vm-pxtest-boot
  namespace: default
  labels:
    portworx.io/app: kubevirt
spec:
  source:
    http:
      # Cirros: tiny (15 MB), boots fast, always available. Good for smoke tests.
      url: https://download.cirros-cloud.net/0.6.2/cirros-0.6.2-x86_64-disk.img
  # Use `storage:` (CDI smart path) — NOT `pvc:` (raw template).
  # CDI auto-resolves from the `storageclass.kubevirt.io/is-default-virt-class`
  # annotation on px-rwx-block-kubevirt + its StorageProfile (RWX + Block).
  # No need to hardcode storageClassName, accessModes, or volumeMode.
  storage:
    resources:
      requests:
        storage: 1Gi
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-pxtest
  namespace: default
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/domain: vm-pxtest
    spec:
      domain:
        cpu:
          cores: 1
        resources:
          requests:
            memory: 256Mi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinit
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          persistentVolumeClaim:
            claimName: vm-pxtest-boot
        - name: cloudinit
          cloudInitNoCloud:
            userData: |
              #cloud-config
              user: fedora
              password: fedora
              chpasswd: { expire: false }
              ssh_pwauth: True
