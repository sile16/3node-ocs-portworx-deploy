# HyperConverged CR — tells CNV to deploy the virt stack (virt-operator,
# virt-api, virt-controller, virt-handler daemonset, CDI, SSP, etc).
#
# Apply AFTER the CNV operator's InstallPlan has been approved and the
# hco-operator deployment is Available.
#
# Minimal config — relies on the CNV operator defaults for certRotation,
# liveMigration, etc. Tune fields here if a site needs more aggressive
# migration concurrency or infrastructure-level placement.
apiVersion: hco.kubevirt.io/v1beta1
kind: HyperConverged
metadata:
  name: kubevirt-hyperconverged
  namespace: openshift-cnv
spec:
  # Disable auto-import of RHEL/Fedora/CentOS boot images.
  # These consume ~180 GiB of PX pool (6 images × 30 GiB × repl=2)
  enableCommonBootImageImport: false
