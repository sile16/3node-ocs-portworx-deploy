# Arbiter px-metadata (p5, 64 GiB) only. No px-data — arbiter is storageless.
apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: arbiter
  name: 98-px-storage-arbiter
spec:
  config:
    ignition:
      version: 3.5.0
    storage:
      disks:
        - device: /dev/disk/by-id/coreos-boot-disk   # stable, hardware-agnostic (RHCOS 4.11+)
          partitions:
            - label: px-metadata
              number: 5
              startMiB: 174080   # 170 GiB OS reservation
              sizeMiB: 65536     # 64 GiB
