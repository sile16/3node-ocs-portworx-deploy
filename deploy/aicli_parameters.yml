---
# aicli paramfile for the 3-node TNA cluster.
#   cd deploy && aicli create cluster --paramfile aicli_parameters.yml tna
# Edit the TODO lines for your site. `manifests: .` picks up 01-04*.yaml in this dir.
# This is the only file to edit per site — hostnames, VIPs, DNS, pull secret path all live here.

base_dns_domain: example.local
openshift_version: "4.21"
control_plane_count: 2
pull_secret: ~/.local/pullsecret      # TODO

network_type: OVNKubernetes
sno: false
full_iso: true                         # one ISO, burn to USB, boot all 3 nodes
manifests: .

api_vip: 10.0.0.10                     # TODO: free routable IP, machineNetwork
ingress_vip: 10.0.0.11                 # TODO: free routable IP, machineNetwork

# aicli matches hosts by MAC. Replace placeholders with real hardware values.
hosts:
  - name: master-1.example.local       # TODO
    mac: "52:54:00:00:00:01"           # TODO
    role: master
  - name: master-2.example.local       # TODO
    mac: "52:54:00:00:00:02"           # TODO
    role: master
  - name: arbiter-1.example.local      # TODO
    mac: "52:54:00:00:00:03"           # TODO
    role: arbiter
